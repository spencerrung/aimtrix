limit_req_zone $binary_remote_addr zone=aimtrix_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=aimtrix_assets:10m rate=80r/s;

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/manifest+json application/wasm image/svg+xml;

    # Arbitrary homeservers require broad HTTPS/WSS connection directives. No
    # third-party script origins are allowed, which keeps tokens away from
    # remote JavaScript. Tighten connect/img/media in a single-server deployment
    # if custom homeservers and providers are disabled.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self), geolocation=(), payment=(), usb=()" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    location = /_health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Instance configuration is replaced at deploy time and must never be
    # pinned by a browser or edge cache.
    location = /config.json {
        expires -1;
        limit_req zone=aimtrix_general burst=30 nodelay;
        try_files $uri =404;
    }

    location ~* ^/assets/.*\.(?:css|js|mjs|wasm|png|jpg|jpeg|gif|webp|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        limit_req zone=aimtrix_assets burst=50 nodelay;
        try_files $uri =404;
    }

    location ~* \.(?:svg|webmanifest)$ {
        expires 1h;
        limit_req zone=aimtrix_assets burst=30 nodelay;
        try_files $uri =404;
    }

    location / {
        expires -1;
        limit_req zone=aimtrix_general burst=30 nodelay;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }
}
